[kubernetes]
format = 'on [έδ╡ ($user on )$context \($namespace\)](dimmed green) '
disabled = true
contexts = [
  { context_pattern = "dev.local.cluster.k8s", style = "green", symbol = "ΏθΤΦ " },
]
