# Powerline style with Nord color palette

format = """
$username\
$hostname\
$container\
$os\
$directory\
$git_branch\
$git_status\
$git_metrics\
$kubernetes\
$status
"""
scan_timeout = 50
command_timeout = 1000
add_newline = false
palette = 'nord'

[palettes.nord]
nord0 = '#2E3440'
nord1 = '#3B4252'
nord2 = '#434C5E'
nord3 = '#4C566A'
nord4 = '#D8DEE9'
nord11 = '#BF616A'
nord13 = '#EBCB8B'
nord14 = '#A2BE8A'

# username, host and OS
[username]
# style_root = 'bg:nord0 fg:nord11'
# style_user = 'bg:nord0 fg:nord4'
format = '[$user]($style)'
show_always = true
disabled = false

[hostname]
ssh_only = true
ssh_symbol = ' ΌυΒ'
trim_at = '.'
format = '[@$hostname$ssh_symbol]($style)'
# style = 'bg:nord0 fg:nord4'
detect_env_vars = ['!CONTAINER_ID']
disabled = false

[container]
format = '[ $name ]($style)'
# style = 'bg:nord0 fg:nord13'

[os]
format = '[ $symbol ]($style)'
# style = 'bg:nord0 fg:nord4'
disabled = false
# for symbols look at the end of the file

# directory
[directory]
truncation_length = 3
truncate_to_repo = true
format = '[ $path ]($style)[$read_only]($read_only_style)'
# style = 'bg:nord1 fg:nord4'
disabled = false
read_only = ' ≤░Ν╛ '
# read_only_style = 'bg:nord1 fg:nord11'
truncation_symbol = 'έΑο/'

[directory.substitutions]
'Documents' = '≤░Ιβ'
'Dokumente' = '≤░Ιβ'
'Downloads' = 'ΎΑβ '
'Music' = 'ΎΑΒ '
'Musik' = 'ΎΑΒ '
'Pictures' = 'ΎΑ╛ '
'Bilder' = 'ΎΑ╛ '
'Projects' = 'Όψθ '

# git
[git_branch]
symbol = 'ΎΡα'
# style = 'bg:nord2 fg:nord4'
format = '[ $symbol $branch ]($style)'

[git_status]
# style = 'bg:nord2 fg:nord4'
format = '[$all_status$ahead_behind ]($style)'

[git_metrics]
# added_style = 'bg:nord2 fg:nord14'
# deleted_style = 'bg:nord2 fg:nord11'
format = '[+$added ]($added_style)[-$deleted ]($deleted_style)'
disabled = false

# programming
[c]
symbol = 'Όαη '
# style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = 'ΌΚ╡ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = 'Όαυ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = 'Όαπ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[python]
symbol = 'Όε╝ '
# style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) (\($virtualenv\)) ]($style)'

[gradle]
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = 'Όζ╖ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[java]
symbol = 'ΌΚΨ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = 'Όαν '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = 'Όεα'
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = '≤░Ηξ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = 'Όηρ'
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = 'Όε╖ '
style = 'bg:nord3 fg:nord4'
format = '[ $symbol ($version) ]($style)'

# status
[status]
format = '[ $symbol ]($style)'
style = "bold"
symbol = '[ΎΣπ](fg:nord11)'
# success_symbol = '[Ός▓](fg:nord14)'
success_symbol = '[έηε](bold green)' # The 'success_symbol' segment is being set to 'έηε' with the color 'bold green'
not_executable_symbol = '[ΏθδΘ](fg:nord11)'
not_found_symbol = '[≤░ΞΚ](fg:nord11)'
sigint_symbol = '[ΌΑΛ](fg:nord13)'
signal_symbol = '[ΌΑΛ](fg:nord11)'
disabled = false

